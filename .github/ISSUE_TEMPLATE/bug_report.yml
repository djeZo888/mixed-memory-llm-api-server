name: Bug report
description: Report a reproducible project problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include secrets, tokens, private keys, passwords, or model weights.
  - type: input
    id: milestone
    attributes:
      label: Milestone
      placeholder: M3 root-disk guard
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Paste redacted command output or report excerpts.
    validations:
      required: false
