name: CI

on:
  push:
  pull_request:

jobs:
  repository-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            AGENTS.md
            README.md
            ROADMAP.md
            SECURITY.md
            CONTRIBUTING.md
            CHANGELOG.md
            LICENSE.todo.md
            .gitignore
            .env.example
            docs/project-charter.md
            docs/architecture.md
            docs/hardware-profiles.md
            docs/installation.md
            docs/operations.md
            docs/model-matrix.md
            docs/api-contract.md
            docs/security.md
            docs/testing.md
            docs/troubleshooting.md
            reports/.gitkeep
            tests/fixtures/.gitkeep
          )
          for path in "${required[@]}"; do
            test -e "$path" || { echo "missing required path: $path"; exit 1; }
          done

      - name: Reject committed secret-like files
        shell: bash
        run: |
          set -euo pipefail
          forbidden=$(find . -path ./.git -prune -o \( -name .env -o -name '*.key' -o -name '*.pem' -o -name auth.json -o -name MEMORY.md \) -print)
          if [ -n "$forbidden" ]; then
            echo "$forbidden"
            exit 1
          fi

      - name: Check markdown local links
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys
          failures = []
          pattern = re.compile(r'\[[^\]]+\]\(([^)]+)\)')
          root = Path('.').resolve()
          for md in Path('.').rglob('*.md'):
              if '.git' in md.parts:
                  continue
              text = md.read_text(encoding='utf-8')
              for match in pattern.finditer(text):
                  target = match.group(1).strip()
                  if not target or '://' in target or target.startswith('#') or target.startswith('mailto:'):
                      continue
                  path_part = target.split('#', 1)[0]
                  if not path_part:
                      continue
                  resolved = (md.parent / path_part).resolve()
                  try:
                      resolved.relative_to(root)
                  except ValueError:
                      failures.append(f'{md}: link escapes repository: {target}')
                      continue
                  if not resolved.exists():
                      failures.append(f'{md}: missing local link target: {target}')
          if failures:
              print('\n'.join(failures))
              sys.exit(1)
          print('markdown-local-links-ok')
          PY
